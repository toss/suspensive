skills:
  # ─────────────────────────── @suspensive/react ───────────────────────────
  - name: 'Suspensive React entry point'
    slug: 'react'
    domain: 'error-handling'
    description: 'Root skill for @suspensive/react: decision tree routing to error-handling, loading-ux, ssr-client-only, code-splitting sub-skills'
    type: 'core'
    packages: ['@suspensive/react']
    covers:
      - 'package overview'
      - 'Suspense, ErrorBoundary, ErrorBoundaryGroup, Delay, ClientOnly, lazy, DefaultPropsProvider'
      - '.with() HOC pattern shared by all components'
    failure_modes:
      - mistake: 'Rendering Suspensive components in a Server Component'
        mechanism: 'All Suspensive components are client-only (render-prop children are functions, which cannot cross the RSC serialization boundary); using them in an RSC fails the build or errors at render'
        wrong_pattern: |
          // app/page.tsx — Server Component
          import { Suspense } from '@suspensive/react'
          export default function Page() {
            return <Suspense fallback={<Spinner />}>...</Suspense>
          }
        correct_pattern: |
          // Use them inside a 'use client' component
          'use client'
          import { Suspense } from '@suspensive/react'
        source: 'https://github.com/toss/suspensive/issues/1563'
        priority: 'HIGH'
        status: 'active'
        skills: ['react', 'declarative-queries']
      - mistake: 'Attaching static properties to .with() result directly'
        mechanism: 'The component type returned by Component.with() rejects extra static properties (router loaders etc.); assignment is a type error — wrap with Object.assign'
        wrong_pattern: |
          const Page = Suspense.with({ fallback: <Spinner /> }, PageComponent)
          Page.loader = loader // type error
        correct_pattern: |
          export default Object.assign(Suspense.with({ fallback: <Spinner /> }, PageComponent), { loader })
        source: 'https://github.com/toss/suspensive/issues/1665'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Layered error handling'
    slug: 'error-handling'
    domain: 'error-handling'
    description: 'Catch specific error types with shouldCatch, reset one or many boundaries, access error/reset inside fallbacks, trigger boundaries without throwing'
    type: 'sub-skill'
    packages: ['@suspensive/react']
    covers:
      - 'ErrorBoundary (fallback, shouldCatch, resetKeys, onReset, onError)'
      - 'ErrorBoundary.Consumer, useErrorBoundary().setError'
      - 'useErrorBoundaryFallbackProps'
      - 'ErrorBoundaryGroup, ErrorBoundaryGroup.Consumer, blockOutside, useErrorBoundaryGroup'
      - 'ErrorBoundaryFallbackProps type'
    tasks:
      - 'catch only NetworkError at an outer boundary and let others propagate'
      - 'add a Reset All button that resets every boundary on the page'
      - 'show error message and retry button inside a fallback without prop drilling'
    failure_modes:
      - mistake: 'Using react-error-boundary prop interface on Suspensive ErrorBoundary'
        mechanism: 'Agents trained on react-error-boundary pass FallbackComponent/fallbackRender/onResetKeysChange; Suspensive has a single unified fallback prop and reset via fallback props'
        wrong_pattern: |
          <ErrorBoundary
            FallbackComponent={ErrorFallback}
            onResetKeysChange={handleChange}
          >
        correct_pattern: |
          <ErrorBoundary
            fallback={({ error, reset }) => <ErrorFallback error={error} onRetry={reset} />}
          >
        source: 'docs/react/comparison.mdx'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Expecting fallback errors to re-render the same fallback'
        mechanism: 'Since v3, an error thrown inside a fallback propagates to the parent ErrorBoundary instead of recursively re-rendering the same fallback (react-error-boundary and v2 behavior)'
        wrong_pattern: |
          // assuming this boundary catches its own fallback's errors forever
          <ErrorBoundary fallback={<BrokenFallback />}>{children}</ErrorBoundary>
        correct_pattern: |
          // wrap with a parent boundary to catch fallback errors
          <ErrorBoundary fallback={<LastResort />}>
            <ErrorBoundary fallback={<BrokenFallback />}>{children}</ErrorBoundary>
          </ErrorBoundary>
        source: 'docs/react/migration/migrate-to-v3.mdx (#1409)'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Behavior changed in v3.0'
      - mistake: 'Calling useErrorBoundaryFallbackProps outside a fallback'
        mechanism: 'The hook throws when called in children or outside an ErrorBoundary; it is only valid inside the fallback element'
        wrong_pattern: |
          const Child = () => {
            const { reset } = useErrorBoundaryFallbackProps() // throws
            return <button onClick={reset} />
          }
          <ErrorBoundary fallback={<Fallback />}><Child /></ErrorBoundary>
        correct_pattern: |
          const Fallback = () => {
            const { error, reset } = useErrorBoundaryFallbackProps()
            return <button onClick={reset}>{error.message}</button>
          }
          <ErrorBoundary fallback={<Fallback />}>{children}</ErrorBoundary>
        source: 'docs/react/ErrorBoundary.mdx warning callout'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Manually filtering errors by rethrowing inside fallback'
        mechanism: 'Agents replicate the react-error-boundary idiom of inspecting error in the fallback and rethrowing; shouldCatch does this declaratively and keeps TS error narrowing'
        wrong_pattern: |
          <ErrorBoundary fallback={({ error }) => {
            if (!(error instanceof NetworkError)) throw error
            return <NetworkErrorUI />
          }}>
        correct_pattern: |
          <ErrorBoundary shouldCatch={NetworkError} fallback={({ error }) => <NetworkErrorUI />}>
        source: 'docs/react/ErrorBoundary.mdx shouldCatch section'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Passing callback fallback from a Server Component'
        mechanism: 'In RSC, functions cannot cross the server→client boundary; pass JSX as fallback and read error/reset via useErrorBoundaryFallbackProps in a client component'
        wrong_pattern: |
          // app/page.tsx (Server Component)
          <ErrorBoundary fallback={({ error }) => <p>{error.message}</p>}>
        correct_pattern: |
          // app/page.tsx (Server Component)
          <ErrorBoundary fallback={<ErrorFallbackClient />}>
          // ErrorFallbackClient.tsx: 'use client' + useErrorBoundaryFallbackProps()
        source: 'docs/react/ErrorBoundary.mdx useErrorBoundaryFallbackProps section'
        priority: 'HIGH'
        status: 'active'
        skills: ['error-handling', 'ssr-client-only']
      - mistake: 'Expecting ErrorBoundary to reset itself on remount'
        mechanism: 'A caught error persists across remounts by design; reset explicitly via fallback reset, resetKeys, or ErrorBoundaryGroup — and when the error came from a query, the query error cache must be reset too'
        wrong_pattern: |
          // navigating away and back, expecting the boundary to be clean
          <ErrorBoundary fallback={<ErrorUI />}>{children}</ErrorBoundary>
        correct_pattern: |
          <ErrorBoundary resetKeys={[location.key]} fallback={({ reset }) => <button onClick={reset}>retry</button>}>
        source: 'https://github.com/toss/suspensive/issues/91'
        priority: 'HIGH'
        status: 'active'
        skills: ['error-handling', 'suspensive-react']
      - mistake: 'Assuming caught values are always Error instances'
        mechanism: 'Thrown strings/objects reach the fallback as-is; fallback code assuming error.message breaks on non-Error throws'
        source: 'https://github.com/toss/suspensive/issues/1785 (open)'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Loading UX without flashes'
    slug: 'loading-ux'
    domain: 'loading-ux'
    description: 'Suspense fallbacks, Delay to prevent flash-of-loading, isDelayed fade-in, app-wide default fallbacks'
    type: 'sub-skill'
    packages: ['@suspensive/react']
    covers:
      - 'Suspense (fallback, .with)'
      - 'Delay (ms, fallback, children render-prop isDelayed)'
      - 'DefaultPropsProvider + new DefaultProps'
    tasks:
      - 'show a skeleton only if loading exceeds 200ms'
      - 'fade a spinner in smoothly instead of popping'
      - 'set one default fallback for every Suspense in the app'
    failure_modes:
      - mistake: 'Hand-rolling spinner delay with useState/useEffect/setTimeout'
        mechanism: 'Agents generate a custom useDelayedFlag hook; Delay does this declaratively and composes inside Suspense fallback'
        wrong_pattern: |
          const [show, setShow] = useState(false)
          useEffect(() => { const t = setTimeout(() => setShow(true), 200); return () => clearTimeout(t) }, [])
        correct_pattern: |
          <Suspense fallback={<Delay ms={200}><Spinner /></Delay>}>
        source: 'docs/react/Delay.mdx'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Passing a plain object to DefaultPropsProvider'
        mechanism: 'defaultProps must be an instance of DefaultProps; a plain object is not accepted'
        wrong_pattern: |
          <DefaultPropsProvider defaultProps={{ Suspense: { fallback: <Spinner /> } }}>
        correct_pattern: |
          const defaultProps = new DefaultProps({ Suspense: { fallback: <Spinner /> } })
          <DefaultPropsProvider defaultProps={defaultProps}>
        source: 'docs/react/DefaultPropsProvider.mdx'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Abrupt skeleton→content swap instead of isDelayed fade'
        mechanism: 'Delay children accepts a render prop receiving isDelayed (v3.12+) for opacity transitions; agents unaware of it write CSS animation wiring by hand'
        wrong_pattern: |
          <Delay ms={200}><Spinner /></Delay>
          // plus a separate hand-written fade-in component
        correct_pattern: |
          <Delay ms={200}>
            {({ isDelayed }) => <Spinner style={{ opacity: isDelayed ? 1 : 0, transition: 'opacity 200ms' }} />}
          </Delay>
        source: 'docs/react/Delay.mdx (#1312)'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Reading Delay ms as extending fallback display time'
        mechanism: 'Delay postpones EXPOSING its children/fallback; it never prolongs how long a fallback stays visible (fetch 1s + ms 3s does not mean 4s of fallback)'
        source: 'https://github.com/toss/suspensive/issues/182'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'SSR control and client-only rendering'
    slug: 'ssr-client-only'
    domain: 'ssr'
    description: 'Skip SSR per Suspense boundary with clientOnly, hydration-safe client detection with ClientOnly/useIsClient'
    type: 'sub-skill'
    packages: ['@suspensive/react']
    covers:
      - 'Suspense clientOnly prop'
      - 'ClientOnly component'
      - 'useIsClient (useSyncExternalStore-based)'
    tasks:
      - 'render a browser-API-dependent widget without hydration mismatch'
      - 'skip SSR for one boundary in a Next.js page'
      - 'gradually re-enable SSR for a boundary that was client-only'
    failure_modes:
      - mistake: 'useEffect mounted-flag instead of useIsClient/ClientOnly'
        mechanism: 'The mounted-flag idiom causes an extra render and tearing risk; Suspensive uses useSyncExternalStore with getServerSnapshot so server/client snapshots are consistent'
        wrong_pattern: |
          const [mounted, setMounted] = useState(false)
          useEffect(() => setMounted(true), [])
          if (!mounted) return null
        correct_pattern: |
          const isClient = useIsClient()
          if (!isClient) return null
          // or: <ClientOnly fallback={null}>{children}</ClientOnly>
        source: 'docs/react/useIsClient.mdx, docs/react/ClientOnly.mdx'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Using removed Suspense.CSROnly'
        mechanism: 'Suspense.CSROnly was renamed to the clientOnly prop in v2; agents trained on v1 still generate it and it does not exist'
        wrong_pattern: |
          <Suspense.CSROnly fallback={<Spinner />}>{children}</Suspense.CSROnly>
        correct_pattern: |
          <Suspense clientOnly fallback={<Spinner />}>{children}</Suspense>
        source: 'docs/react/migration/migrate-to-v2.mdx'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'Removed in v2; agents trained on v1 code still generate it'
      - mistake: 'next/dynamic ssr:false for a single subtree'
        mechanism: 'dynamic(() => import(...), { ssr: false }) forces a separate file and component indirection; Suspense clientOnly achieves per-boundary SSR skip inline and can be reverted by removing one prop'
        wrong_pattern: |
          const Widget = dynamic(() => import('./Widget'), { ssr: false })
        correct_pattern: |
          <Suspense clientOnly fallback={<Skeleton />}><Widget /></Suspense>
        source: 'docs/react/Suspense.mdx clientOnly section'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Misreading ClientOnly fallback as an error/loading state'
        mechanism: 'ClientOnly fallback (and Suspense clientOnly fallback) is what the SERVER renders into the HTML; it appears only before hydration and never again on later client mounts'
        source: 'https://github.com/toss/suspensive/issues/1158, https://github.com/toss/suspensive/issues/873'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Safe code splitting'
    slug: 'code-splitting'
    domain: 'code-splitting'
    description: 'lazy with .load() preloading and onError, createLazy defaults, reloadOnError for chunk-load failures after deploys'
    type: 'sub-skill'
    packages: ['@suspensive/react']
    covers:
      - 'lazy (experimental), lazy(...).load()'
      - 'createLazy(defaultOptions)'
      - 'reloadOnError({ retry, retryDelay })'
    tasks:
      - 'preload a route component on hover'
      - 'auto-reload the page when a deploy invalidates old chunks'
    failure_modes:
      - mistake: 'React.lazy with no chunk-failure recovery'
        mechanism: 'After a deploy, stale HTML requests old hashed chunks and React.lazy rejects forever; reloadOnError retries then reloads, using storage to avoid reload loops'
        wrong_pattern: |
          import { lazy } from 'react'
          const Page = lazy(() => import('./Page'))
        correct_pattern: |
          import { createLazy, reloadOnError } from '@suspensive/react'
          const lazy = createLazy(reloadOnError({ retry: 1 }))
          const Page = lazy(() => import('./Page'))
        source: 'docs/react/lazy.mdx'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Treating lazy interface as stable'
        mechanism: 'lazy/createLazy/reloadOnError are experimental; the interface may change between minor versions'
        source: 'docs/react/lazy.mdx experimental callout'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Migrate @suspensive/react to v3'
    slug: 'migrate-to-v3'
    domain: 'migration'
    description: 'v2→v3 and v1→v2 breaking changes: wrap→.with(), AsyncBoundary removal, HOC removal, fallback error propagation, codemods'
    type: 'lifecycle'
    packages: ['@suspensive/react']
    covers:
      - 'wrap builder → Component.with()'
      - 'AsyncBoundary → ErrorBoundary + Suspense'
      - 'withSuspense/withErrorBoundary/... → .with()'
      - 'ErrorBoundaryGroup.Reset → ErrorBoundaryGroup.Consumer'
      - 'npx @suspensive/codemods migrate-with-api .'
    tasks:
      - 'upgrade an app from @suspensive/react v2 to v3'
      - 'replace wrap builder chains with .with()'
    failure_modes:
      - mistake: 'Generating the removed wrap builder API'
        mechanism: 'wrap.ErrorBoundaryGroup().ErrorBoundary().Suspense().on() was removed in v3; each component now exposes .with()'
        wrong_pattern: |
          const Page = wrap
            .ErrorBoundary({ fallback: ErrorUI })
            .Suspense({ fallback: <Spinner /> })
            .on(PageComponent)
        correct_pattern: |
          const Page = ErrorBoundary.with({ fallback: ErrorUI },
            Suspense.with({ fallback: <Spinner /> }, PageComponent))
        source: 'docs/react/migration/migrate-to-v3.mdx (#1452)'
        priority: 'CRITICAL'
        status: 'fixed-but-legacy-risk'
        version_context: 'Removed in v3; agents trained on v2 code still generate wrap'
      - mistake: 'Generating removed AsyncBoundary or with* HOCs'
        mechanism: 'AsyncBoundary and withSuspense/withDelay/withErrorBoundary/withErrorBoundaryGroup were removed in v2'
        wrong_pattern: |
          <AsyncBoundary pendingFallback={<Spinner />} rejectedFallback={ErrorUI}>
        correct_pattern: |
          <ErrorBoundary fallback={ErrorUI}><Suspense fallback={<Spinner />}>{children}</Suspense></ErrorBoundary>
        source: 'docs/react/migration/migrate-to-v2.mdx'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'Removed in v2'
      - mistake: 'React 17 or useSyncExternalStore shim assumptions'
        mechanism: 'v2+ requires React >= 18.0 (native useSyncExternalStore); installing alongside React 17 fails peer resolution'
        source: 'docs/migration/migrate-to-v2.mdx'
        priority: 'MEDIUM'
        status: 'active'

  # ──────────────── @suspensive/react-query-4 / react-query-5 ────────────────
  - name: 'Suspensive React Query entry point'
    slug: 'react-query'
    domain: 'data-fetching'
    description: 'Root skill: which package to install (react-query-4 vs react-query-5), which APIs come from TanStack Query vs Suspensive, decision tree to sub-skills'
    type: 'core'
    packages: ['@suspensive/react-query-4', '@suspensive/react-query-5']
    covers:
      - 'package selection: @suspensive/react-query-4 (TSQ v4, Safari<15) vs @suspensive/react-query-5 (TSQ v5)'
      - 'deprecated backported APIs: import useSuspenseQuery/queryOptions from @tanstack/react-query'
      - 'networkMode fixed to always (v3)'
    failure_modes:
      - mistake: 'Importing backported hooks from Suspensive instead of TanStack Query'
        mechanism: 'useSuspenseQuery/useSuspenseQueries/useSuspenseInfiniteQuery/queryOptions/infiniteQueryOptions/mutationOptions are official in TSQ (v5, and v4.40+/4.44+); the Suspensive re-exports are deprecated'
        wrong_pattern: |
          import { useSuspenseQuery, queryOptions } from '@suspensive/react-query-5'
        correct_pattern: |
          import { useSuspenseQuery, queryOptions } from '@tanstack/react-query'
          // Suspensive is for what TSQ lacks: <SuspenseQuery/>, <Mutation/>, <QueriesHydration/>...
        source: 'docs/react-query/useSuspenseQuery.mdx deprecation warnings; codemod tanstack-query-import'
        priority: 'HIGH'
        status: 'active'
        skills: ['react-query', 'declarative-queries']
      - mistake: 'Installing the @suspensive/react-query facade for new code'
        mechanism: 'The facade (postinstall version switch / npm alias) is being phased out by the maintainer; install @suspensive/react-query-4 or @suspensive/react-query-5 directly to match the installed @tanstack/react-query major'
        wrong_pattern: |
          npm install @suspensive/react-query
        correct_pattern: |
          npm install @suspensive/react-query-5   # with @tanstack/react-query@5
          npm install @suspensive/react-query-4   # with @tanstack/react-query@4 (Safari < 15 support)
        source: 'maintainer interview (2026-07-04); https://github.com/toss/suspensive/issues/1851, /issues/1493 (pnpm 10+/Yarn Berry block the postinstall version switch, exports default to v4 and break v5 builds); diagnose with npx suspensive-react-query status'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Setting networkMode on suspense queries'
        mechanism: 'Since v3, networkMode is fixed to always for suspense hooks/components (Chromium navigator.onLine is unreliable and paused fetchStatus deadlocks Suspense); user-supplied networkMode is ignored'
        wrong_pattern: |
          useSuspenseQuery({ queryKey, queryFn, networkMode: 'online' })
        correct_pattern: |
          useSuspenseQuery({ queryKey, queryFn })
          // codemod: npx @suspensive/codemods remove-networkmode .
        source: 'docs/react-query/migration/migrate-to-v3.mdx (#1458)'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Declarative queries in JSX'
    slug: 'declarative-queries'
    domain: 'data-fetching'
    description: 'SuspenseQuery/SuspenseQueries/SuspenseInfiniteQuery render-prop components instead of hook wrapper components; IsFetching'
    type: 'sub-skill'
    packages: ['@suspensive/react-query-4', '@suspensive/react-query-5']
    covers:
      - 'SuspenseQuery, SuspenseQueries, SuspenseInfiniteQuery, IsFetching (experimental)'
      - 'select, queryOptions integration'
    tasks:
      - 'fetch two queries in parallel at the same JSX depth'
      - 'remove a data-only wrapper component'
    failure_modes:
      - mistake: 'Creating wrapper components just to call useSuspenseQuery'
        mechanism: 'Hooks force a child component under Suspense; SuspenseQuery moves fetching into JSX so only presentational components remain — the core value of this library'
        wrong_pattern: |
          const UserInfo = () => {
            const { data } = useSuspenseQuery(userQueryOptions())
            return <Profile {...data} />
          }
        correct_pattern: |
          <SuspenseQuery {...userQueryOptions()}>
            {({ data }) => <Profile {...data} />}
          </SuspenseQuery>
        source: 'docs/react-query/motivation.mdx'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Passing enabled or placeholderData to suspense queries'
        mechanism: 'Removed from suspense hooks in v2 (data must be guaranteed); TSQ v5 also excludes them from useSuspenseQuery options'
        wrong_pattern: |
          <SuspenseQuery queryKey={key} queryFn={fn} enabled={!!userId}>
        correct_pattern: |
          {userId ? <SuspenseQuery queryKey={key} queryFn={fn}>{children}</SuspenseQuery> : null}
        source: 'docs/react-query/migration/migrate-to-v2.mdx'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Checking isLoading/isError on suspense query results'
        mechanism: 'Suspense query result types have no isLoading/isError; data is always the success type — boundaries guarantee it. Guard code is dead code and hides the mental model'
        wrong_pattern: |
          <SuspenseQuery {...opts}>
            {({ data, isLoading }) => isLoading ? <Spinner /> : <List data={data} />}
        correct_pattern: |
          <SuspenseQuery {...opts}>{({ data }) => <List data={data} />}</SuspenseQuery>
        source: 'docs/react-query/motivation.mdx (Focus on the success case)'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'SuspenseQuery without an ancestor Suspense boundary'
        mechanism: 'The component suspends; with no boundary above it, suspension bubbles to the nearest ancestor Suspense or the app root, blanking unrelated UI'
        wrong_pattern: |
          <SuspenseQuery {...postQueryOptions(id)}>{({ data }) => <Post data={data} />}</SuspenseQuery>
        correct_pattern: |
          <Suspense fallback={<PostSkeleton />}>
            <SuspenseQuery {...postQueryOptions(id)}>{({ data }) => <Post data={data} />}</SuspenseQuery>
          </Suspense>
        source: 'https://github.com/toss/suspensive/issues/1654'
        priority: 'HIGH'
        status: 'active'

  - name: 'Declarative mutations'
    slug: 'mutations'
    domain: 'data-fetching'
    description: 'Mutation render-prop component and mutationOptions; mutations inside list items and conditionals where hooks cannot go'
    type: 'sub-skill'
    packages: ['@suspensive/react-query-4', '@suspensive/react-query-5']
    covers:
      - 'Mutation component'
      - 'mutationOptions'
    tasks:
      - 'add a delete button with its own mutation per list row'
    failure_modes:
      - mistake: 'Extracting a component per list row just to call useMutation'
        mechanism: 'Hooks cannot be called in loops; agents create PostItemWithMutation wrappers, while <Mutation> works inline per row'
        wrong_pattern: |
          {posts.map((post) => <PostItemWithMutation key={post.id} post={post} />)}
        correct_pattern: |
          {posts.map((post) => (
            <Mutation key={post.id} {...deletePostMutationOptions(post.id)}>
              {({ mutate, isLoading }) => <button disabled={isLoading} onClick={() => mutate()}>delete</button>}
            </Mutation>
          ))}
        source: 'docs/react-query/Mutation.mdx'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Importing mutationOptions from Suspensive on TSQ versions that ship it'
        mechanism: 'mutationOptions was backported to TSQ v4.44+; the Suspensive export is deprecated there'
        wrong_pattern: |
          import { mutationOptions } from '@suspensive/react-query-5'
        correct_pattern: |
          import { mutationOptions } from '@tanstack/react-query'
        source: 'docs/react-query/mutationOptions.mdx deprecation warning'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Prefetching in render'
    slug: 'prefetching'
    domain: 'data-fetching'
    description: 'Fire prefetches during render before Suspense boundaries: usePrefetchQuery, PrefetchQuery components, avoiding request waterfalls'
    type: 'sub-skill'
    packages: ['@suspensive/react-query-4', '@suspensive/react-query-5']
    covers:
      - 'usePrefetchQuery, usePrefetchInfiniteQuery'
      - 'PrefetchQuery, PrefetchInfiniteQuery components'
    tasks:
      - 'start fetching detail data while list renders to avoid a waterfall'
      - 'prefetch inside a list row without extracting a component'
    failure_modes:
      - mistake: 'Prefetching in useEffect after mount'
        mechanism: 'Effect-based prefetch fires after paint, losing the waterfall win; usePrefetchQuery fires during render before the child suspends'
        wrong_pattern: |
          useEffect(() => { queryClient.prefetchQuery(postQueryOptions(id)) }, [id])
        correct_pattern: |
          usePrefetchQuery(postQueryOptions(id))
        source: 'docs/react-query/usePrefetchQuery.mdx'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Expecting prefetch results or suspension from prefetch APIs'
        mechanism: 'Prefetch hooks/components return nothing and never suspend or throw; they only warm the cache for a later suspense query'
        source: 'docs/react-query/PrefetchQuery.mdx'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Server rendering and hydration for queries'
    slug: 'ssr-hydration'
    domain: 'ssr'
    description: 'Request-scoped QueryClient with createGetQueryClient, RSC prefetch+dehydrate+hydrate with QueriesHydration, skipSsrOnError/timeout, streaming'
    type: 'sub-skill'
    packages: ['@suspensive/react-query-4', '@suspensive/react-query-5']
    covers:
      - 'createGetQueryClient (experimental): per-request server instance, browser singleton, server gcTime forced Infinity'
      - 'QueriesHydration (experimental, async RSC only): queries, queryClient, skipSsrOnError, timeout'
    tasks:
      - 'set up QueryClient correctly in Next.js App Router'
      - 'prefetch several queries on the server and stream independently'
      - 'let the browser take over when server fetch fails (auth)'
    failure_modes:
      - mistake: 'Module-level global QueryClient on the server'
        mechanism: "A shared QueryClient leaks one user's cached data into another user's request — a security vulnerability; createGetQueryClient returns a new instance per server request and a singleton only in the browser"
        wrong_pattern: |
          export const queryClient = new QueryClient() // shared across requests
        correct_pattern: |
          export const { getQueryClient } = createGetQueryClient()
          // call getQueryClient() where needed; never store it in a global
        source: 'docs/react-query/createGetQueryClient.mdx important/error callouts'
        priority: 'CRITICAL'
        status: 'active'
      - mistake: 'Storing getQueryClient() result in a module global'
        mechanism: 'export const queryClient = getQueryClient() reintroduces cross-request sharing that the factory exists to prevent'
        wrong_pattern: |
          export const queryClient = getQueryClient()
        correct_pattern: |
          const Component = () => {
            const queryClient = getQueryClient()
          }
        source: 'docs/react-query/createGetQueryClient.mdx error callout'
        priority: 'CRITICAL'
        status: 'active'
      - mistake: 'Passing config to getQueryClient instead of createGetQueryClient'
        mechanism: 'getQueryClient takes no arguments (browser singleton must be config-stable); defaults belong on createGetQueryClient(config)'
        wrong_pattern: |
          const queryClient = getQueryClient({ defaultOptions: { queries: { staleTime: 60_000 } } })
        correct_pattern: |
          const { getQueryClient } = createGetQueryClient({ defaultOptions: { queries: { staleTime: 60_000 } } })
        source: 'docs/react-query/createGetQueryClient.mdx warning callout'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Using QueriesHydration outside async RSC'
        mechanism: 'QueriesHydration is an async server component; it only works in RSC frameworks (Next.js App Router). In pages router or client components it cannot render'
        source: 'docs/react-query/QueriesHydration.mdx Important Notes'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Manual per-query prefetch/dehydrate boilerplate in every RSC'
        mechanism: 'new QueryClient() + prefetchQuery + dehydrate + HydrationBoundary per component re-fetches and duplicates; QueriesHydration wraps the whole flow and mixes regular+infinite queries'
        wrong_pattern: |
          const queryClient = new QueryClient()
          await queryClient.prefetchQuery(postQueryOptions(id))
          return <HydrationBoundary state={dehydrate(queryClient)}>{children}</HydrationBoundary>
        correct_pattern: |
          <QueriesHydration queries={[postQueryOptions(id), commentsQueryOptions(id)]}>
            {children}
          </QueriesHydration>
        source: 'docs/react-query/QueriesHydration.mdx'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Composing Suspensive React with React Query'
    slug: 'suspensive-react'
    domain: 'error-handling'
    description: 'ErrorBoundary + Suspense + SuspenseQuery together; replacing removed QueryErrorBoundary; resetting query errors via boundaries'
    type: 'composition'
    packages: ['@suspensive/react-query-4', '@suspensive/react-query-5']
    covers:
      - 'ErrorBoundary + useQueryErrorResetBoundary (QueryErrorBoundary replacement)'
      - 'shouldCatch for API error types around SuspenseQuery'
      - 'Delay inside Suspense fallback around queries'
    failure_modes:
      - mistake: 'Importing removed QueryErrorBoundary'
        mechanism: 'QueryErrorBoundary was removed in v3 (it forced a peerDependency on @suspensive/react); compose ErrorBoundary with useQueryErrorResetBoundary instead'
        wrong_pattern: |
          import { QueryErrorBoundary } from '@suspensive/react-query'
        correct_pattern: |
          const { reset } = useQueryErrorResetBoundary()
          <ErrorBoundary onReset={reset} fallback={({ reset }) => <button onClick={reset}>retry</button>}>
        source: 'docs/react-query/migration/migrate-to-v3.mdx (#1424)'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'Removed in v3; agents trained on v2 code still import it'
      - mistake: 'Retry button that resets the boundary but not the query error'
        mechanism: 'Resetting only the ErrorBoundary re-throws the cached query error immediately; wire useQueryErrorResetBoundary().reset into onReset'
        source: 'docs/react-query/migration/migrate-to-v3.mdx replacement snippet'
        priority: 'HIGH'
        status: 'active'

  # ─────────────────────────── @suspensive/jotai ───────────────────────────
  - name: 'Jotai atoms in JSX'
    slug: 'jotai'
    domain: 'jotai-atoms'
    description: 'Atom/AtomValue/SetAtom render-prop components; async atoms delegating pending state to Suspense'
    type: 'core'
    packages: ['@suspensive/jotai']
    covers:
      - 'Atom ([value, setValue]), AtomValue (value), SetAtom (setValue)'
      - 'async atoms + Suspense, jotai extensions (tanstack-query, cache)'
    failure_modes:
      - mistake: 'No Suspense boundary around async atom components'
        mechanism: 'Async atoms suspend; without a boundary the suspension bubbles to the nearest ancestor Suspense or the app root fallback'
        wrong_pattern: |
          <AtomValue atom={asyncUserAtom}>{(user) => <Profile {...user} />}</AtomValue>
        correct_pattern: |
          <Suspense fallback={<Spinner />}>
            <AtomValue atom={asyncUserAtom}>{(user) => <Profile {...user} />}</AtomValue>
          </Suspense>
        source: 'docs/jotai/AtomValue.mdx'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Wrapper components to read atoms per list item'
        mechanism: 'Same render-prop rationale as SuspenseQuery: Atom components read/write atoms inline where hooks would force extraction'
        source: 'docs/jotai/motivation.mdx'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Expecting SetAtom async writes not to suspend'
        mechanism: 'Setting an async writable atom via SetAtom triggers Suspense during the write'
        source: 'docs/jotai/SetAtom.mdx'
        priority: 'MEDIUM'
        status: 'active'

tensions:
  - name: 'clientOnly simplicity vs SSR value'
    skills: ['ssr-client-only', 'ssr-hydration']
    description: 'Skipping SSR with clientOnly is the easiest fix for hydration issues, but throws away streaming SSR and server prefetch benefits that QueriesHydration exists to provide'
    implication: 'Agents reach for clientOnly to silence hydration errors when the correct fix is proper server prefetch/hydration; conversely they build QueriesHydration pipelines for widgets that should simply be client-only'
  - name: 'Suspensive components vs official TSQ hooks'
    skills: ['react-query', 'declarative-queries']
    description: 'Suspensive re-exports deprecated backported hooks for compatibility, but its real value is the JSX components TSQ lacks'
    implication: 'Agents either import everything from Suspensive (deprecated re-exports) or dismiss the library entirely; correct: hooks/queryOptions from @tanstack/react-query, components from @suspensive/react-query-N'
  - name: 'Getting-started simplicity vs server security'
    skills: ['ssr-hydration']
    description: 'A module-level QueryClient is the simplest setup and correct in SPA, but a security vulnerability on the server'
    implication: 'Agents copy SPA setup into SSR apps, sharing one QueryClient across requests'

